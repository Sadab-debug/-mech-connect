<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-key="page_title_mechanic_bookings">MechConnect - Mechanic Bookings</title>
    <link rel="stylesheet" href="mechanic_bookings.css">
    <link rel="stylesheet" href="../i18n.css">
</head>
<body>
    <div class="navbar">
        <div class="brand">
            <span class="brand-dot"></span>
            <strong>MechConnect</strong>
        </div>
        <div class="nav-links">
            <a href="http://127.0.0.1:5000/mechanic_dashboard_full.html" data-i18n-key="nav_dashboard">📊 Dashboard</a>
            <a href="http://127.0.0.1:5000/chat/chat.html" data-i18n-key="nav_chat">💬 Messages</a>
            <a href="#" id="logoutBtn" data-i18n-key="nav_logout">🚪 Logout</a>
            <span class="lang-selector">
                <select id="languageSelect" aria-label="Select language">
                    <option value="en">English</option>
                    <option value="bn">বাংলা</option>
                </select>
            </span>
        </div>
    </div>

    <main class="mechanic-bookings-page">
        <div class="page-header">
            <h1 class="page-title" data-i18n-key="booking_page_title">My Bookings</h1>
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-value" id="statRequested">0</div>
                    <div class="stat-label" data-i18n-key="requested_stat">Requested</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statConfirmed">0</div>
                    <div class="stat-label" data-i18n-key="confirmed_stat">Confirmed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label" data-i18n-key="pending_stat">Pending Work</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label" data-i18n-key="completed_stat">Completed</div>
                </div>
            </div>
        </div>

        <section class="booking-sections">
            <!-- Requested Bookings -->
            <div class="booking-section">
                <div class="section-head">
                    <h2 class="section-title section-title-requested" data-i18n-key="section_requested">Requested</h2>
                    <div class="section-hint" data-i18n-key="requested_hint">New requests</div>
                </div>
                <div id="requestedBookings" class="booking-list"></div>
            </div>

            <!-- Confirmed Bookings -->
            <div class="booking-section">
                <div class="section-head">
                    <h2 class="section-title section-title-confirmed" data-i18n-key="section_confirmed">Confirmed</h2>
                    <div class="section-hint" data-i18n-key="confirmed_hint">Accepted bookings</div>
                </div>
                <div id="confirmedBookings" class="booking-list"></div>
            </div>

            <!-- Pending Work -->
            <div class="booking-section">
                <div class="section-head">
                    <h2 class="section-title section-title-pending" data-i18n-key="pending_stat">Pending Work</h2>
                    <div class="section-hint" data-i18n-key="section_pending_hint">Scheduled jobs</div>
                </div>
                <div id="pendingWork" class="booking-list"></div>
            </div>
        </section>
    </main>

    <!-- Counter Offer Modal -->
    <div id="counterModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="closeCounterModal">&times;</button>
            <div class="modal-content">
                <h2 data-i18n-key="counter_offer_title">Send Counter Offer</h2>
                <div class="booking-summary" id="counterSummary"></div>
                <form class="counter-form" id="counterForm">
                    <div class="form-field">
                        <label data-i18n-key="counter_offer_label">Your counter offer (BDT)</label>
                        <input id="counterOffer" type="number" min="0" required>
                    </div>
                    <div class="form-field">
                        <label data-i18n-key="counter_offer_note">Note (optional)</label>
                        <textarea id="counterNote" placeholder="Add a note..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" data-i18n-key="send_counter_offer">Send Counter Offer</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../i18n.js"></script>
    <script src="mechanic_bookings.js"></script>
</body>
</html>
