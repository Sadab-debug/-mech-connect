<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-key="page_title_booking">MistriVai - Booking</title>
    <link rel="stylesheet" href="booking.css">
    <link rel="stylesheet" href="../i18n.css">
</head>
<body>
    <div class="navbar">
        <div class="brand">
            <span class="brand-dot"></span>
            <strong>MistriVai</strong>
        </div>
        <div class="nav-links">
            <a href="../main.html" data-i18n-key="nav_home">Home</a>
            <a href="booking.html" data-i18n-key="nav_booking">Booking</a>
            <a href="../chat/chat.html" data-i18n-key="nav_messages">Messages</a>
            <a href="../index/index.html" data-i18n-key="nav_about">About Us</a>
            <a href="../login/login.html" id="loginNav" data-i18n-key="nav_login">Login/Signup</a>
            <span class="lang-selector">
                <select id="languageSelect" aria-label="Select language">
                    <option value="en">English</option>
                    <option value="bn">বাংলা</option>
                </select>
            </span>
            <span id="profileNav" style="display:none; margin-left:16px;">
                <img id="profilePic" src="" alt="Profile" style="width:32px;height:32px;border-radius:50%;vertical-align:middle;display:none;">
                <span id="profileName" style="margin-left:8px;vertical-align:middle;"></span>
                <button id="logoutBtn" style="margin-left:8px;display:none;">Logout</button>
            </span>
        </div>
    </div>

    <main class="booking-page">
        <div class="booking-header">
            <h1 class="page-title" data-i18n-key="booking_page_title">My Bookings</h1>
            <div class="header-actions">
                <button class="btn-secondary" id="searchMechanicBtn" data-i18n-key="booking_search_btn">Search for mechanic</button>
            </div>
        </div>

        <section class="booking-sections">
            <!-- Requested Bookings -->
            <div class="booking-section">
                <div class="section-head">
                    <h2 class="section-title" data-i18n-key="section_requested">Requested</h2>
                    <div class="section-hint" data-i18n-key="section_requested_hint">Awaiting mechanic response</div>
                </div>
                <div id="requestedBookings" class="booking-list"></div>
            </div>

            <!-- Confirmed Bookings -->
            <div class="booking-section">
                <div class="section-head">
                    <h2 class="section-title" data-i18n-key="section_confirmed">Confirmed</h2>
                    <div class="section-hint" data-i18n-key="section_confirmed_hint">Ready to schedule</div>
                </div>
                <div id="confirmedBookings" class="booking-list"></div>
            </div>
        </section>
    </main>

    <!-- Booking Confirmation Modal -->
    <div id="bookingConfirmModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="closeConfirmModal">&times;</button>
            <div class="modal-content">
                <h2 data-i18n-key="modal_confirm_booking">Confirm Booking</h2>
                <div class="mechanic-summary" id="mechanicSummary"></div>
                <form class="booking-form" id="bookingForm">
                    <div class="form-field">
                        <label data-i18n-key="label_address">Address</label>
                        <input id="bookingAddress" type="text" data-i18n-placeholder-key="placeholder_address" placeholder="Your address" required>
                    </div>
                    <div class="form-field">
                        <label data-i18n-key="label_preferred_time">Preferred time</label>
                        <input id="bookingTime" type="datetime-local" required>
                    </div>
                    <div class="form-field">
                        <label data-i18n-key="label_problem_description">Problem description</label>
                        <textarea id="bookingProblem" data-i18n-placeholder-key="placeholder_problem_description" placeholder="Describe the issue..." required></textarea>
                    </div>
                    <div class="form-field">
                        <label data-i18n-key="label_offer">Your offer (BDT)</label>
                        <input id="bookingOffer" type="number" min="0" data-i18n-placeholder-key="placeholder_offer" placeholder="e.g. 500" required>
                    </div>
                    <div class="form-field">
                        <label data-i18n-key="label_payment_method">Payment method</label>
                        <div class="payment-methods">
                            <label><input type="radio" name="paymentMethod" value="bkash" checked> <span data-i18n-key="option_bkash">bKash</span></label>
                            <label><input type="radio" name="paymentMethod" value="nagad"> <span data-i18n-key="option_nagad">Nagad</span></label>
                            <label><input type="radio" name="paymentMethod" value="rocket"> <span data-i18n-key="option_rocket">Rocket</span></label>
                            <label><input type="radio" name="paymentMethod" value="card"> <span data-i18n-key="option_card">Card</span></label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" data-i18n-key="button_proceed_payment">Proceed to Payment</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="closePaymentModal">&times;</button>
            <div class="modal-content">
                <h2>Payment</h2>
                <div class="payment-summary">
                    <div class="summary-row">
                        <span>Mechanic fee</span>
                        <span id="paymentMechanicFee">0 BDT</span>
                    </div>
                    <div class="summary-row">
                        <span>Platform fee (5%)</span>
                        <span id="paymentPlatformFee">0 BDT</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="paymentTotal">0 BDT</span>
                    </div>
                    <p class="fee-note">Platform fee is 5% of the mechanic fee.</p>
                </div>
                <div class="payment-providers" id="paymentProviders"></div>
                <button class="btn-primary" id="confirmPaymentBtn">Confirm Payment</button>
            </div>
        </div>
    </div>

    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <script src="../i18n.js"></script>
    <script src="booking.js"></script>
    <script>
    // Profile fetch and navbar update
    function updateProfileNav(user) {
        document.getElementById('loginNav').style.display = 'none';
        const profileNav = document.getElementById('profileNav');
        profileNav.style.display = '';
        document.getElementById('profileName').textContent = user.username;
        if (user.profile_pic) {
            const pic = document.getElementById('profilePic');
            pic.src = user.profile_pic;
            pic.style.display = '';
        }
        document.getElementById('logoutBtn').style.display = '';
    }
    function resetProfileNav() {
        document.getElementById('loginNav').style.display = '';
        document.getElementById('profileNav').style.display = 'none';
    }
    fetch('/profile', {
        method: 'GET',
        credentials: 'include'
    })
    .then(res => res.json())
    .then(data => {
        if (data.logged_in) {
            updateProfileNav(data.user);
        } else {
            resetProfileNav();
        }
    })
    .catch(() => resetProfileNav());

    document.getElementById('logoutBtn').onclick = function() {
        fetch('/logout', {
            method: 'POST',
            credentials: 'include'
        }).then(() => {
            window.location.reload();
        });
    };
    </script>
</body>
</html>
