kind = "mobile"
previewPath = "/mobile/"
title = "MistriVai Mobile"
version = "1.0.0"
id = "artifacts/mistrivai-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18200

[services.development]
run = "pnpm --filter @workspace/mistrivai-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mistrivai-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mistrivai-mobile", "run", "serve" ]

[services.env]
PORT = "18200"
BASE_PATH = "/mobile/"
